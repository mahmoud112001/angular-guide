<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angular Concepts — Interactive Guide</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080c12;
  --surface:  #0e1520;
  --card:     #131c2b;
  --border:   #1e2d42;
  --border2:  #243347;
  --accent:   #e1342a;
  --accent2:  #ff5c52;
  --green:    #10b981;
  --blue:     #3b82f6;
  --yellow:   #f59e0b;
  --purple:   #8b5cf6;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --muted2:   #94a3b8;
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Syne', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo .logo-mark {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}

.logo-icon {
  width: 32px;
  height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 700;
  color: #fff;
}

.logo-text {
  font-size: 16px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.02em;
}

.sidebar-subtitle {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--mono);
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}

.sidebar-nav::-webkit-scrollbar { width: 4px; }
.sidebar-nav::-webkit-scrollbar-track { background: transparent; }
.sidebar-nav::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted2);
  position: relative;
}

.nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
.nav-item.active { background: rgba(225,52,42,0.08); color: #fff; border-left-color: var(--accent); }

.nav-num {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  min-width: 18px;
}

.nav-item.active .nav-num { color: var(--accent); }

.nav-badge {
  margin-left: auto;
  font-size: 9px;
  font-family: var(--mono);
  background: rgba(225,52,42,0.15);
  color: var(--accent);
  padding: 2px 6px;
  border-radius: 4px;
}

/* ── MAIN ── */
.main {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.main::-webkit-scrollbar { width: 5px; }
.main::-webkit-scrollbar-track { background: var(--bg); }
.main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── TOPIC HEADER ── */
.topic-header {
  padding: 32px 40px 0;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
  border-bottom: 1px solid var(--border);
  padding-bottom: 20px;
}

.topic-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}

.topic-title {
  font-size: 30px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.03em;
  margin-bottom: 6px;
}

.topic-subtitle {
  font-size: 14px;
  color: var(--muted2);
  font-family: var(--mono);
}

/* ── CONTENT SECTIONS ── */
.content {
  padding: 32px 40px 60px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* Section card */
.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.section-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,0.02);
}

.section-icon {
  font-size: 16px;
}

.section-title {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted2);
}

.section-body {
  padding: 20px;
}

.section-body p {
  font-size: 14px;
  color: var(--muted2);
  line-height: 1.8;
  margin-bottom: 12px;
}

.section-body p:last-child { margin-bottom: 0; }

/* Highlight text */
.hl { color: var(--accent2); font-weight: 700; }
.hl-green { color: var(--green); font-weight: 600; }
.hl-blue  { color: var(--blue);  font-weight: 600; }
.hl-yellow{ color: var(--yellow);font-weight: 600; }

/* Types grid */
.types-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}

.type-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}

.type-card-title {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  color: var(--accent2);
  margin-bottom: 6px;
}

.type-card-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}

/* When/Why grid */
.when-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.when-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.when-card-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-family: var(--mono);
  margin-bottom: 10px;
  font-weight: 700;
}

.when-card.when { border-top: 2px solid var(--blue); }
.when-card.when .when-card-label { color: var(--blue); }
.when-card.why  { border-top: 2px solid var(--green); }
.when-card.why  .when-card-label { color: var(--green); }

.when-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.when-list li {
  font-size: 12px;
  color: var(--muted2);
  display: flex;
  gap: 8px;
  line-height: 1.5;
}

.when-list li::before { content: "→"; color: var(--muted); flex-shrink: 0; }

/* Code block */
.code-block {
  background: #060a0f;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.code-block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}

.code-lang {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
}

.code-dots {
  display: flex;
  gap: 6px;
}

.code-dots span {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.d1 { background: #ff5f57; }
.d2 { background: #febc2e; }
.d3 { background: #28c840; }

pre {
  padding: 18px 20px;
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.75;
  overflow-x: auto;
  color: #cdd6f4;
}

pre::-webkit-scrollbar { height: 4px; }
pre::-webkit-scrollbar-track { background: transparent; }
pre::-webkit-scrollbar-thumb { background: var(--border2); }

/* Syntax colors */
.kw  { color: #cba6f7; } /* keyword */
.str { color: #a6e3a1; } /* string */
.fn  { color: #89b4fa; } /* function */
.cm  { color: #6c7086; font-style: italic; } /* comment */
.tag { color: #f38ba8; } /* html tag */
.att { color: #fab387; } /* attribute */
.val { color: #a6e3a1; } /* value */
.typ { color: #89dceb; } /* type */
.num { color: #fab387; } /* number */
.dec { color: #f9e2af; } /* decorator */

/* Interview Q&A */
.qa-list { display: flex; flex-direction: column; gap: 8px; }

.qa-item {
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.qa-q {
  padding: 12px 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  background: rgba(255,255,255,0.02);
  transition: background 0.15s;
  user-select: none;
}

.qa-q:hover { background: rgba(255,255,255,0.04); }

.qa-badge {
  font-size: 10px;
  font-family: var(--mono);
  background: rgba(225,52,42,0.15);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}

.qa-arrow {
  margin-left: auto;
  color: var(--muted);
  font-size: 12px;
  transition: transform 0.2s;
}

.qa-item.open .qa-arrow { transform: rotate(180deg); }

.qa-a {
  display: none;
  padding: 14px 16px;
  font-size: 13px;
  color: var(--muted2);
  line-height: 1.7;
  border-top: 1px solid var(--border);
  background: rgba(16,185,129,0.03);
}

.qa-item.open .qa-a { display: block; }

/* Interactive demo */
.demo-area {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
}

.demo-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 12px;
}

.demo-input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 13px;
  width: 100%;
  outline: none;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}

.demo-input:focus { border-color: var(--accent); }

.demo-output {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--green);
  min-height: 36px;
}

.demo-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  margin-right: 8px;
  transition: background 0.2s, transform 0.1s;
}

.demo-btn:hover  { background: var(--accent2); }
.demo-btn:active { transform: scale(0.97); }

.demo-btn.green { background: var(--green); }
.demo-btn.green:hover { background: #059669; }

.demo-flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.demo-row  { margin-bottom: 10px; }

/* Observable stream viz */
.stream-viz {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  min-height: 36px;
  padding: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
}

.stream-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  animation: pop 0.3s ease-out;
}

@keyframes pop {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

/* Progress bar */
.prog-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}

.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* Tag chip */
.chip {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-family: var(--mono);
  font-weight: 500;
  gap: 4px;
}

.chip-red    { background: rgba(225,52,42,0.15);  color: var(--accent2); border: 1px solid rgba(225,52,42,0.25); }
.chip-green  { background: rgba(16,185,129,0.12); color: var(--green);   border: 1px solid rgba(16,185,129,0.25); }
.chip-blue   { background: rgba(59,130,246,0.12); color: var(--blue);    border: 1px solid rgba(59,130,246,0.25); }
.chip-yellow { background: rgba(245,158,11,0.12); color: var(--yellow);  border: 1px solid rgba(245,158,11,0.25); }

/* Topics list */
.topics-page {
  display: none;
  flex-direction: column;
}

.topics-page.active { display: flex; }

/* Responsive */
@media (max-width: 700px) {
  .sidebar { width: 220px; min-width: 220px; }
  .content { padding: 20px; }
  .when-grid { grid-template-columns: 1fr; }
}
</style>
</head>

    <div class="logo-mark">

<main class="main" id="main"></main>

<script>
// ──────────────────────────────────────────────────────────────
// DATA
// ──────────────────────────────────────────────────────────────
const topics = [

// 0. INTERPOLATION
{
  num:'01', eyebrow:'Template Syntax',
  title:'Interpolation {{ }}',
  subtitle:'عرض بيانات الـ component في الـ HTML',
  sections:[
    {
      icon:'💡', title:'يعني إيه؟',
      body:`<p>Interpolation هي أبسط طريقة لعرض قيمة من الـ <span class="hl">TypeScript</span> في الـ <span class="hl">HTML</span>.<br>
بتحط القيمة بين علامتين تعجب مزدوجتين <span class="hl">{{ }}</span> وAngular بيحولها لـ String ويحطها في الصفحة.</p>
<p>كل ما تغيرت القيمة في الـ component، الـ HTML بيتحدث تلقائياً — ده اللي بيسموه <span class="hl-green">One-Way Data Binding</span> (من TS → HTML).</p>`
    },
    {
      icon:'🗂️', title:'أنواعه',
      types:[
        { t:'Property', d:'عرض قيمة متغير عادي: {{ name }}' },
        { t:'Expression', d:'حسابات بسيطة: {{ 2 + 2 }} أو {{ price * qty }}' },
        { t:'Method Call', d:'استدعاء function: {{ getFullName() }}' },
        { t:'Ternary', d:'شرط مختصر: {{ age > 18 ? "Adult" : "Minor" }}' },
      ]
    },
    {
      icon:'📅', title:'امتى وليه؟',
      when:['عايز تعرض اسم user أو رقم أو أي نص','عايز تعرض نتيجة عملية حسابية','عايز تعرض بيانات جاية من API','أي وقت عندك قيمة في TS وعايز تظهر في HTML'],
      why:['Angular بيعمل Change Detection تلقائي','الكود بيبقى نضيف — الـ logic في TS والـ view في HTML','أسرع من DOM manipulation اليدوية','بيدعم Expressions بس مش statements — بيحميك من أخطاء']
    },
    {
      icon:'💻', title:'كود',
      code:`<span class="cm">// component.ts</span>
<span class="kw">export class</span> <span class="typ">AppComponent</span> {
  name    = <span class="str">'Mahmoud'</span>;
  age     = <span class="num">24</span>;
  price   = <span class="num">100</span>;
  qty     = <span class="num">3</span>;

  <span class="fn">getGreeting</span>() {
    <span class="kw">return</span> <span class="str">\`Hello, \${this.name}!\`</span>;
  }
}

<span class="cm">&lt;!-- component.html --&gt;</span>
<span class="tag">&lt;h1&gt;</span>{{ name }}<span class="tag">&lt;/h1&gt;</span>                       <span class="cm">&lt;!-- Mahmoud --&gt;</span>
<span class="tag">&lt;p&gt;</span>Age: {{ age }}<span class="tag">&lt;/p&gt;</span>                    <span class="cm">&lt;!-- Age: 24 --&gt;</span>
<span class="tag">&lt;p&gt;</span>Total: {{ price * qty }}<span class="tag">&lt;/p&gt;</span>          <span class="cm">&lt;!-- Total: 300 --&gt;</span>
<span class="tag">&lt;p&gt;</span>{{ getGreeting() }}<span class="tag">&lt;/p&gt;</span>              <span class="cm">&lt;!-- Hello, Mahmoud! --&gt;</span>
<span class="tag">&lt;p&gt;</span>{{ age >= 18 ? 'Adult' : 'Minor' }}<span class="tag">&lt;/p&gt;</span>  <span class="cm">&lt;!-- Adult --&gt;</span>`
    },
    {
      icon:'🎮', title:'جرب بنفسك',
      demo:'interpolation'
    },
    {
      icon:'🎯', title:'أسئلة الإنترفيو',
      qa:[
        { q:'ما الفرق بين Interpolation وProperty Binding؟', a:'Interpolation بتحول القيمة لـ String وبتضيفها كـ text في الـ HTML. Property Binding بتربط قيمة بـ DOM property مباشرة وبتقدر تمرر أي نوع (boolean, array, object). مثلاً [disabled]="true" ما تقدرش تعملها بـ Interpolation.' },
        { q:'هل ممكن تكتب JavaScript statements داخل {{ }}؟', a:'لأ. Angular بيسمح فقط بـ Expressions (قيم، عمليات حسابية، method calls، ternary). ما يجيش if/else حقيقي أو for loop أو new keyword أو assignment (=) جوه الـ template.' },
        { q:'ما معنى One-Way Data Binding؟', a:'يعني البيانات بتتدفق في اتجاه واحد بس — من الـ component (TypeScript) إلى الـ template (HTML). لو غيرت الـ HTML مش هيتغير الـ TypeScript. عشان تعمل الاتجاهين محتاج [(ngModel)] = Two-Way Binding.' },
      ]
    }
  ]
},

// 1. PROPERTY BINDING
{
  num:'02', eyebrow:'Template Syntax',
  title:'Property Binding [ ]',
  subtitle:'ربط قيمة TypeScript بـ DOM property',
  sections:[
    {
      icon:'💡', title:'يعني إيه؟',
      body:`<p>Property Binding بتخليك تربط قيمة من الـ component بـ <span class="hl">property</span> في الـ DOM العنصر — مش كـ text، كـ قيمة حقيقية.</p>
<p>بتستخدمها بأقواس مربعة: <span class="hl">[property]="expression"</span><br>
مثال: <span class="hl-green">[disabled]="isLoading"</span> بيمرر boolean حقيقي للـ button مش string.</p>
<p>لاحظ الفرق: <span class="hl-yellow">src="{{ url }}"</span> = Interpolation = بتحول URL لـ string.<br>
<span class="hl-green">[src]="url"</span> = Property Binding = بتمرر القيمة مباشرة.</p>`
    },
    {
      icon:'🗂️', title:'أنواعه',
      types:[
        { t:'DOM Property', d:'[value], [src], [href], [disabled], [checked]' },
        { t:'Class Binding', d:'[class.active]="isActive" — يضيف class لو true' },
        { t:'Style Binding', d:'[style.color]="myColor" — يحدد style مباشرة' },
        { t:'Attribute Binding', d:'[attr.aria-label]="label" — للـ HTML attributes' },
        { t:'Component Input', d:'[student]="myStudent" — تمرير data لـ component' },
      ]

function renderCode(c){ return `<div class="code-block"><div class="code-block-header"><span class="code-lang">TypeScript / HTML</span><div class="code-dots"><span class="d1"></span><span class="d2"></span><span class="d3"></span></div></div><pre>${c}</pre></div>`; }

function renderSection(sec){
  let html = `<div class="section"><div class="section-head"><span class="section-icon">${sec.icon}</span><span class="section-title">${sec.title}</span></div><div class="section-body">`;

  if(sec.body) html += sec.body;
  if(sec.types){ html += `<div class="types-grid">`; sec.types.forEach(t=>{ html+=`<div class="type-card"><div class="type-card-title">${t.t}</div><div class="type-card-desc">${t.d}</div></div>`; }); html+=`</div>`; }
  if(sec.when){ html+=`<div class="when-grid"><div class="when-card when"><div class="when-card-label">✦ امتى تستخدمه</div><ul class="when-list">${sec.when.map(w=>`<li>${w}</li>`).join('')}</ul></div><div class="when-card why"><div class="when-card-label">✦ ليه تستخدمه</div><ul class="when-list">${sec.why.map(w=>`<li>${w}</li>`).join('')}</ul></div></div>`; }
  if(sec.code) html += renderCode(sec.code);
  if(sec.demo) html += renderDemo(sec.demo);
  if(sec.qa){
    html += `<div class="qa-list">`;
    sec.qa.forEach((q,i)=>{
      html += `<div class="qa-item" id="qa-${sec.demo||'x'}-${i}">
        <div class="qa-q" onclick="toggleQA('qa-${sec.demo||'x'}-${i}')">
          <span class="qa-badge">Q${i+1}</span>
          ${q.q}
          <span class="qa-arrow">▾</span>
        </div>
        <div class="qa-a">${q.a}</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div></div>`;
  return html;
}

function renderTopic(t){
  return `
    <div class="topic-header">
      <div class="topic-eyebrow">${t.num} — ${t.eyebrow}</div>
      <h1 class="topic-title">${t.title}</h1>
      <p class="topic-subtitle">${t.subtitle}</p>
    </div>
    <div class="content">
      ${t.sections.map(renderSection).join('')}
    </div>`;
}

let ngifLogin = true, ngifLoad = false;

function attachDemos(idx){ /* demos auto-attach via inline handlers */ }

function updateInterp(){
  const name = document.getElementById('d-name')?.value || 'Mahmoud';
  const price = document.getElementById('d-price')?.value || 100;
  const el = document.getElementById('d-interp-out');
  if(el) el.innerHTML = `&lt;h1&gt;{{ name }}&lt;/h1&gt; → <b style="color:var(--green)">${name}</b> | &lt;p&gt;{{ price * 3 }}&lt;/p&gt; → <b style="color:var(--green)">${price*3}</b>`;
}
setTimeout(updateInterp, 50);

function toggleProp(){
  propDisabled = !propDisabled;
  const btn = document.getElementById('d-prop-btn');
  const out = document.getElementById('d-prop-out');
  if(btn){ btn.disabled = propDisabled; btn.style.opacity = propDisabled ? '0.4' : '1'; }
  if(out) out.textContent = `[disabled]="${propDisabled}" — الـ button ${propDisabled?'معطل':'مفعّل'}`;
}

function toggleClass(){
  propActive = !propActive;
  const box = document.getElementById('d-class-box');
  if(box){
    box.style.borderColor = propActive ? 'var(--accent)' : 'var(--border)';
    box.style.color = propActive ? 'var(--accent2)' : 'var(--muted2)';
    box.style.background = propActive ? 'rgba(225,52,42,0.08)' : 'transparent';
    box.textContent = propActive ? 'class="active" ← class اتضاف' : 'Class Box (toggle active)';
  }
}

function incrCount(){ countVal++; const el=document.getElementById('d-count'); if(el) el.textContent=`Count: ${countVal}`; }
function resetCount(){ countVal=0; const el=document.getElementById('d-count'); if(el) el.textContent='Count: 0'; }
function updateKeyup(e){ const el=document.getElementById('d-keyup-out'); if(el) el.textContent=`القيمة: ${e.target.value}`; }

function toggleLogin(){
  ngifLogin = !ngifLogin;
  document.getElementById('d-ngif-logged').style.display = ngifLogin ? 'block' : 'none';
  document.getElementById('d-ngif-guest').style.display  = ngifLogin ? 'none'  : 'block';
  updateNgifStatus();
}
function toggleLoad(){
  ngifLoad = !ngifLoad;
  document.getElementById('d-ngif-spinner').style.display = ngifLoad ? 'block' : 'none';
  updateNgifStatus();
}
function updateNgifStatus(){
  const el = document.getElementById('d-ngif-status');
  if(el) el.textContent = `isLoggedIn: ${ngifLogin} | isLoading: ${ngifLoad}`;
}

function addForItem(){
  const inp = document.getElementById('d-for-name');
  const name = inp?.value.trim() || 'Student';
  forItems.push(name);
  if(inp) inp.value='';
  renderForList();
}
function clearForItems(){ forItems=[]; renderForList(); }
function renderForList(){
  const el = document.getElementById('d-for-list');
  if(!el) return;
  if(!forItems.length){ el.innerHTML='<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px">Array فاضي — *ngFor ما بيعرضش حاجة</div>'; return; }
  el.innerHTML = forItems.map((n,i)=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:13px">
      <span><span style="color:var(--muted);font-family:var(--mono);font-size:11px">[${i}]</span> ${n}${i===0?' <span style="font-size:10px;color:var(--green)">(first)</span>':''}${i===forItems.length-1?' <span style="font-size:10px;color:var(--yellow)">(last)</span>':''}</span>
      <button onclick="removeForItem(${i})" style="background:transparent;border:none;color:var(--accent);cursor:pointer;font-size:16px">×</button>
    </div>`).join('');
}
function removeForItem(i){ forItems.splice(i,1); renderForList(); }

function emitBS(){
  const val = document.getElementById('d-bs-val')?.value;
  if(!val) return;
  const colors = ['var(--green)','var(--blue)','var(--yellow)'];
  ['d-bs-a','d-bs-b','d-bs-c'].forEach((id,i)=>{
    const el = document.getElementById(id);
    if(el){ el.textContent=val; el.style.color=colors[i]; el.style.transform='scale(1.1)'; setTimeout(()=>el.style.transform='',200); }
  });
  const log = document.getElementById('d-bs-log');
  if(log) log.textContent = `Stream: next("${val}") → 3 subscribers notified ✓`;
  if(document.getElementById('d-bs-val')) document.getElementById('d-bs-val').value='';
}

function startObs(){
  if(obsInterval) return;
  const stream = document.getElementById('d-obs-stream');
  const status = document.getElementById('d-obs-status');
  const colors = ['#e1342a','#10b981','#3b82f6','#f59e0b','#8b5cf6'];
  if(status) status.textContent = 'Status: Subscribed ✓ — receiving values...';
  obsInterval = setInterval(()=>{
    if(!document.getElementById('d-obs-stream')){ stopObs(); return; }
    obsCount++;
    const dot = document.createElement('div');
    dot.className = 'stream-dot';
    dot.style.background = colors[obsCount%colors.length];
    dot.textContent = obsCount;
    stream.appendChild(dot);
    if(stream.children.length > 12) stream.removeChild(stream.firstChild);
  }, 800);
}
function stopObs(){
  if(obsInterval){ clearInterval(obsInterval); obsInterval=null; }
  const status = document.getElementById('d-obs-status');
  if(status) status.textContent = 'Status: Unsubscribed ■ — no more values';
}

function addIOStudent(){
  const name = document.getElementById('d-io-name')?.value.trim() || 'Student';
  const gpa  = parseFloat(document.getElementById('d-io-gpa')?.value) || 3.5;
  const id   = Date.now();
  ioStudents.push({ id, name, gpa });
  if(document.getElementById('d-io-name'))  document.getElementById('d-io-name').value='';
  if(document.getElementById('d-io-gpa'))   document.getElementById('d-io-gpa').value='';
  renderIOCards();
}
function deleteIOStudent(id){
  ioStudents = ioStudents.filter(s=>s.id!==id);
  const log = document.getElementById('d-io-parent-log');
  if(log) log.innerHTML = `<span style="color:var(--accent)">↑ @Output received: deleteRequested.emit(${id}) — Parent handled it!</span>`;
  renderIOCards();
}
function renderIOCards(){
  const el = document.getElementById('d-io-cards');
  if(!el) return;
  if(!ioStudents.length){ el.innerHTML='<div style="font-size:12px;color:var(--muted);text-align:center;padding:16px">لا يوجد students — ابعت @Input من الـ Parent</div>'; return; }
  el.innerHTML = ioStudents.map(s=>`
    <div style="background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:10px;color:var(--muted);font-family:var(--mono);margin-bottom:2px">CHILD — Student Card Component</div>
        <div style="font-size:13px;font-weight:600;color:var(--text)">@Input: ${s.name}</div>
        <div style="font-size:11px;color:var(--muted2)">GPA: ${s.gpa.toFixed(2)}</div>
      </div>
      <button onclick="deleteIOStudent(${s.id})" class="demo-btn" style="background:rgba(225,52,42,0.15);color:var(--accent2);border:1px solid rgba(225,52,42,0.3)">
        @Output emit() ↑
      </button>
    </div>`).join('');
}

// ── INIT ──
show(0);
</script>
</body>
</html>
